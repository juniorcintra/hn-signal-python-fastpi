[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    integration: Integration tests (deselect with '-m "not integration"')
    slow: Slow running tests
    security: Security and authentication tests

addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
